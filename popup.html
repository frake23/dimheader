<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h10"/>
          <circle cx="19" cy="18" r="3"/>
          <line x1="21" y1="20" x2="23" y2="22"/>
        </svg>
        <h1>DimHeader</h1>
      </div>
      <label class="master-toggle" title="Включить / Выключить всё">
        <input type="checkbox" id="masterToggle" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </header>

    <div class="divider"></div>

    <div class="headers-list" id="headersList"></div>

    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Добавить заголовок
    </button>

    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="9" x2="9" y2="21"/>
      </svg>
      <p>Заголовков пока нет. Нажмите <strong>Добавить заголовок</strong>, чтобы начать.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
